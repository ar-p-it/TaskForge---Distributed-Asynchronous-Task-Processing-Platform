spring.application.name=worker-service
# spring.application.name=worker-service

# Database Connection

# Day 18 - Docker Compose
# Use DB_URL if provided (Docker), otherwise use localhost (Local Development)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/asyncevents}

# Day 18 - Docker Compose
# Environment variable support for Docker
spring.datasource.username=${DB_USERNAME:a_home}

# Day 18 - Docker Compose
# Environment variable support for Docker
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update

# Hide Hibernate SQL
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Kafka

# Day 18 - Docker Compose
# Uses Docker service name 'kafka' inside containers, localhost otherwise
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Worker Service Consumer
spring.kafka.consumer.group-id=worker-group
spring.kafka.consumer.auto-offset-reset=earliest

# Multiple Consumers
spring.kafka.listener.concurrency=3

# Log Cleanup
logging.level.org.hibernate=ERROR
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN

# Keep Worker logs visible
logging.level.com.example.workerservice=INFO

server.port=8081
spring.jpa.open-in-view=false